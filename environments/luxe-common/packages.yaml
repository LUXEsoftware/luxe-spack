# Very loose requirements for nightly builds
packages:
  all:
    target: [x86_64, aarch64]
    variants: build_type=Release cxxstd=20
    buildable: true

  # Use the system OpenGL as recommended by spack
  # See https://github.com/key4hep/key4hep-spack/issues/318 and
  # https://github.com/key4hep/key4hep-spack/issues/516
  # A version is needed and we set it to 99 so that spack thinks it's the latest
  # (it may not work if the versions in the current system are not what's required
  # but that hasn't happened yet)
  opengl:
    buildable: False
    externals:
    - spec: opengl@99
      prefix: /usr
  openglu:
    buildable: False
    externals:
    - spec: openglu@99
      prefix: /usr
  mesa:
    buildable: False
    externals:
    - spec: mesa@99
      prefix: /usr
  mesa-glu:
    buildable: False
    externals:
    - spec: mesa-glu@99
      prefix: /usr
  # Use the system kerberos, otherwise the tickets obtained at login with the
  # system version don't appear for the spack kerberos (happening on lxplus at least)
  krb5:
    buildable: False
    externals:
    - spec: krb5@99
      prefix: /usr
  # Use the system ssh, otherwise the configuration for the provided ssh will likely be
  # different and things like ssh using kerberos won't work (by extension authentication
  # for git with ssh with kerberos)
  openssh:
    buildable: False
    externals:
    - spec: openssh@99
      prefix: /usr

  # Take external llvm as it won't compile within 6 hours limit
  # llvm@20 (not a newer major) because py-llvmlite (via py-numba) 
  # caps at llvm@20; the rest of the stack has no hard llvm version need.
  #
  # extra_attributes:compilers is REQUIRED: ptarmigan+mpi forces %clang, which
  # under unify:true makes clang the compiler for the whole stack. Without the
  # explicit compiler paths here, spack may bind %clang to this bare external and
  # the compiler-wrapper has no clang binary to exec ("exec: None: not found" ->
  # "C compiler cannot create executables"). Declaring them makes this external a
  # complete, self-sufficient clang definition on every arch.
  llvm:
    buildable: False
    externals:
    - spec: llvm@20.1.8 +clang +lld
      prefix: /usr/lib/llvm-20
      extra_attributes:
        compilers:
          c: /usr/lib/llvm-20/bin/clang
          cxx: /usr/lib/llvm-20/bin/clang++

  # The external llvm is built ~flang, so it provides NO Fortran compiler. With
  # the stack on clang (ptarmigan+mpi forces it, unify:true propagates it), any
  # Fortran package (openblas, ...) would otherwise get the llvm node as its
  # fortran provider and the wrapper execs a non-existent flang
  # ("clang/flang: exec: None: not found"). Route Fortran to gfortran (gcc)
  # instead; C/C++ stay on clang. ptarmigan has no Fortran node, so this does
  # not conflict with its %clang requirement. Mixing clang C/C++ with gfortran
  # is a standard, ABI-compatible combination.
  fortran:
    require: ["gcc"]

  python:
    require: '@3.12'

  dd4hep:
    require: +edm4hep

  # aarch64-only: fix a broken Boost build that silently produces an install
  # containing only the top-level CMake config (no headers, no libraries, no
  # per-component config files), which makes dd4hep fail its find_package(Boost)
  # with 'Could not find boost_headers-config.cmake'.
  #
  # Root cause: Boost is built with its bundled B2, whose clang toolset
  # (tools/build/src/tools/clang.jam, init-flags-cross) hardcodes the target
  # triple as '<arch>-pc-linux', i.e. 'arm64-pc-linux' on aarch64. clang cannot
  # locate the GCC toolchain (crtbeginS.o, libstdc++) for that triple on
  # Ubuntu's multiarch layout - only the exact 'aarch64-linux-gnu' triple
  # resolves. Every B2 link-based configuration check then fails, so
  # zlib/bzip2/lzma/zstd are detected as absent, the only requested library
  # (iostreams) builds nothing, and B2's 'install' meta-target collapses to
  # just the CMake config files. x86_64 is unaffected because clang does
  # resolve the analogous 'x86_64-pc-linux' triple.
  #
  # Force the correct triple via --target (clang honours the last --target on
  # the command line, so the spack wrapper's flags override B2's). Scoped to
  # aarch64 so x86_64 keeps its native triple and does not cross-compile.
  boost:
    require:
    - spec: 'cflags="--target=aarch64-linux-gnu" cxxflags="--target=aarch64-linux-gnu" ldflags="--target=aarch64-linux-gnu"'
      when: 'target=aarch64'

  py-xsuite:
    require: '@0.36.7'

  py-poetry:
    require: '@1.8.5'

  ptarmigan:
    require: '@1.4.2+hdf5+mpi'

  lxelsim:
    require: '@master'

  acts:
    require: '@main+dd4hep+json cxxstd=20'

  k4actstracking:
    require: '@main'